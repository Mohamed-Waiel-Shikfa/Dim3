<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIM3 Workflow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-slate-50 transition-colors duration-500" id="body-bg">

    <nav class="fixed top-8 left-10 w-[calc(100%-80px)] h-[70px] bg-white border border-slate-200 rounded-2xl px-6 flex items-center justify-between z-50 shadow-sm">

        <div x-data="{ open: false, active: 'Data Processing' }" class="relative w-max">
            <div @click="open = !open" class="flex items-center h-[38px] px-4 cursor-pointer hover:bg-slate-100 rounded-lg transition-colors">
                <span x-text="active" class="text-slate-700 font-semibold text-sm"></span>
                <svg class="w-4 h-4 ml-2 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
            </div>

            <div x-show="open" @click.away="open = false" x-transition class="absolute top-full left-0 mt-2 w-max min-w-[200px] bg-white border border-slate-200 rounded-lg shadow-lg overflow-hidden z-50">

                <button @click="active = 'Data Processing'; open = false; document.getElementById('body-bg').className = 'bg-slate-50 transition-colors duration-500'"
                        hx-get="/pages/data_processing" hx-target="#main-content"
                        class="w-full text-left px-4 py-2 text-sm text-slate-600 hover:bg-slate-50 hover:text-slate-900 transition-colors">
                    Data Processing
                </button>

                <button @click="active = 'Model Training'; open = false; document.getElementById('body-bg').className = 'bg-indigo-50 transition-colors duration-500'"
                        hx-get="/pages/model_training" hx-target="#main-content"
                        class="w-full text-left px-4 py-2 text-sm text-slate-600 hover:bg-indigo-50 hover:text-indigo-900 transition-colors">
                    Model Training
                </button>

                <button @click="active = 'Model Evaluation'; open = false; document.getElementById('body-bg').className = 'bg-emerald-50 transition-colors duration-500'"
                        hx-get="/pages/model_evaluation" hx-target="#main-content"
                        class="w-full text-left px-4 py-2 text-sm text-slate-600 hover:bg-emerald-50 hover:text-emerald-900 transition-colors">
                    Model Evaluation
                </button>
            </div>
        </div>

        <div class="text-xs font-bold tracking-widest text-slate-400">DIM3 WORKFLOW</div>
    </nav>

    <main id="main-content" class="min-h-screen pt-[120px]">
        <div hx-get="/pages/data_processing" hx-trigger="load"></div>
    </main>

</body>
</html>
