<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DIM3 Workflow</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <!-- Three.js Import Map -->
    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <style>
        :root {
            transition: all 0.7s cubic-bezier(0.25, 1, 0.5, 1);
        }

        ::-webkit-scrollbar { display: none; }
        * { -ms-overflow-style: none; scrollbar-width: none; }

        /* Mode 0: Data Processing (Warm Amber Gold) */
        body.theme-0 {
            --bg-base: #28220e;
            --bg-panel: #483e18;
            --accent: #d4a017;
            --accent-dim: rgba(212, 160, 23, 0.15);
            --text-glow: 0 0 15px rgba(212, 160, 23, 0.35);
        }

        /* Mode 1: Model Training (Crimson Red) */
        body.theme-1 {
            --bg-base: #2e1c20;
            --bg-panel: #5a353d;
            --accent: #f43f5e;
            --accent-dim: rgba(244, 63, 94, 0.15);
            --text-glow: 0 0 15px rgba(244, 63, 94, 0.25);
        }

        /* Mode 2: Model Evaluation (Matte Sage) */
        body.theme-2 {
            --bg-base: #1d2e24;
            --bg-panel: #385a48;
            --accent: #10b981;
            --accent-dim: rgba(16, 185, 129, 0.15);
            --text-glow: 0 0 15px rgba(16, 185, 129, 0.25);
        }

        body {
            background-color: var(--bg-base);
            color: #e2e8f0;
        }

        /* Page Content Swap Animation */
        .content-enter {
            animation: slideFade 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        @keyframes slideFade {
            from { opacity: 0; transform: translateY(15px) scale(0.98); filter: blur(4px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }
    </style>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
</head>

<body x-data="workflowState()" x-init="init()" :class="'theme-' + activeIndex" class="transition-colors duration-700 ease-in-out font-sans antialiased overflow-hidden flex flex-col h-screen w-screen">

    <nav class="absolute top-8 left-10 w-[calc(100%-80px)] h-[70px] bg-[var(--bg-panel)] border border-[var(--accent-dim)] rounded-2xl px-6 flex items-center justify-between z-50 shadow-2xl transition-colors duration-700 backdrop-blur-md">

        <div class="flex items-center h-full">

            <div class="relative h-[44px] w-max min-w-[200px] rounded-xl bg-[#00000030] border border-[var(--accent-dim)] shadow-inner transition-all duration-300"
                :class="open ? 'overflow-visible' : 'overflow-hidden'"
                @mouseenter="open = true" @mouseleave="open = false" @wheel.prevent="handleScroll($event)">
                <div class="absolute top-0 left-0 w-full rounded-xl transition-all duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)]"
                    :class="open ? 'bg-[var(--bg-panel)] border border-[var(--accent-dim)] shadow-[0_10px_40px_var(--bg-base)] z-50' : 'border border-transparent'"
                    :style="'transform: translateY(calc(-44px * ' + activeIndex + '));'">
                    <template x-for="(mode, index) in modes" :key="index">
                        <div class="h-[44px] flex items-center px-5 cursor-pointer transition-colors duration-300 whitespace-nowrap"
                                @click="selectMode(index); open = false"
                                :class="activeIndex === index ? 'text-[var(--accent)] [text-shadow:var(--text-glow)] font-bold' : 'text-slate-500 hover:text-slate-300 hover:bg-white/5'">
                            <span x-text="mode.name" class="tracking-wide text-[0.85rem] uppercase"></span>
                        </div>
                    </template>
                </div>
            </div>

            <div class="w-px h-8 bg-white/10 mx-6"></div>

            <div id="navbar-tools" class="flex items-center gap-4 h-full"></div>
        </div>

        <div class="text-[0.7rem] font-black tracking-[0.2em] text-[var(--accent)] opacity-50 uppercase transition-colors duration-700">DIM3 Workflow</div>
    </nav>

    <main id="main-content" class="flex-1 w-full pt-[110px] pb-8 px-10 flex overflow-hidden">
        <div hx-get="/pages/data_processing" hx-trigger="load" class="w-full h-full flex"></div>
    </main>

    <!-- Sound Engine (loaded as module, auto-inits on first interaction) -->
    <script type="module">
        import { SoundEngine } from '/static/js/sound-engine.js';
        window.dim3Sound = SoundEngine;
    </script>

    <script>
        // Global state for cross-panel data sharing
        window.dim3 = {
            sessionId: null,
            filePath: null,
            processedData: {},
            settings: {
                samplingMethod: 'fps',
                voxelSize: 32,
                pointCount: 1024,
            },
            // Track active Three.js instances for cleanup
            activeViewports: [],
            registerViewport(vp) { this.activeViewports.push(vp); },
            disposeAll() {
                this.activeViewports.forEach(vp => { try { vp.dispose(); } catch(e) {} });
                this.activeViewports = [];
            },
        };

        function workflowState() {
            return {
                open: false,
                activeIndex: 0,
                isScrolling: false,
                modes: [
                    { name: 'Data Processing', endpoint: '/pages/data_processing' },
                    { name: 'Model Training', endpoint: '/pages/model_training' },
                    { name: 'Model Evaluation', endpoint: '/pages/model_evaluation' }
                ],
                init() {
                    htmx.onLoad(function(content) {
                        if (content.id !== 'main-content') {
                            content.classList.add('content-enter');
                        }
                    });
                },
                handleScroll(e) {
                    if (!this.open || this.isScrolling) return;
                    let direction = e.deltaY > 0 ? 1 : -1;
                    let newIndex = this.activeIndex + direction;
                    if (newIndex >= 0 && newIndex < this.modes.length) {
                        this.isScrolling = true;
                        this.selectMode(newIndex);
                        setTimeout(() => { this.isScrolling = false; }, 400);
                        // Sound: dropdown tick
                        if (window.dim3Sound) window.dim3Sound.play('tick');
                    }
                },
                selectMode(index) {
                    if (this.activeIndex === index) return;
                    // Dispose all 3D viewports before swap
                    window.dim3.disposeAll();
                    this.activeIndex = index;
                    htmx.ajax('GET', this.modes[index].endpoint, {target: '#main-content', swap: 'innerHTML'});
                    // Sound: page switch
                    if (window.dim3Sound) window.dim3Sound.play('switch');
                }
            }
        }
    </script>
</body>
</html>
